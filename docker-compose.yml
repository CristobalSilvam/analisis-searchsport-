version: '3.8'

services:
  dashboard-searchsport:
    build: .
    container_name: searchsport_analytics_app
    ports:
      - "8501:8501"
    environment:
      # Ejemplo de configuración por variable de entorno externa
      - APP_ENV=production
      - TZ=America/Santiago
    volumes:
      # Montamos un volumen local. Si ejecutas generar_datos.py y cambian los CSV, 
      # el contenedor leerá los datos nuevos automáticamente sin tener que reconstruirlo.
      - .:/app
    restart: unless-stopped